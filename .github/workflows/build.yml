      - name: Build Tweak
        run: |
          # This forces the files to exist so 'make' doesn't fail
          echo "TARGET := iphone:clang:latest:14.0" > Makefile
          echo "include \$(THEOS)/makefiles/common.mk" >> Makefile
          echo "TWEAK_NAME = 67mod" >> Makefile
          echo "67mod_FILES = Tweak.x" >> Makefile
          echo "67mod_CFLAGS = -fobjc-arc" >> Makefile
          echo "include \$(THEOS_MAKE_PATH)/tweak.mk" >> Makefile
          
          echo "Package: com.notjosh.67mod" > control
          echo "Name: 67 Mod" >> control
          echo "Version: 1.0" >> control
          echo "Architecture: iphoneos-arm64" >> control
          
          export THEOS_DEVICE_IP=localhost
          make package FINALPACKAGE=1
