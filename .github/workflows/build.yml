name: Build Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
      - name: Build Tweak
        run: |
          export THEOS_DEVICE_IP=localhost
          make package FINALPACKAGE=1
      - name: Move to Repo
        run: |
          mkdir -p debs
          mv packages/*.deb debs/67mod.deb
      - name: Update Packages File
        run: |
          echo "Package: com.notjosh.67mod" > Packages
          echo "Name: 67 Mod" >> Packages
          echo "Version: 1.0" >> Packages
          echo "Architecture: iphoneos-arm64" >> Packages
          echo "Description: Falling 67s" >> Packages
          echo "Filename: debs/67mod.deb" >> Packages
      - name: Push to Repo
        run: |
          git config --global user.name "NotJoshxops"
          git config --global user.email "notjoshxops@github.com"
          git add .
          git commit -m "Auto-build tweak"
          git push
